name: pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: '8.x.x'

      - name: Install Dapr
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash
          dapr --version

      - name: Install Aspire
        run: |
          echo "deb https://apt.aspirehq.io/debian/ stable main" | sudo tee /etc/apt/sources.list.d/aspire.list
          curl -fsSL https://apt.aspirehq.io/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/aspire-archive-keyring.gpg
          sudo apt-get update
          sudo apt-get install -y aspire-cli
          aspire version

      - name: Verify Aspire installation
        run: |
          aspire help

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test
