name: pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: '8.x.x'

      - name: Install Dapr
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash
          dapr --version

      - name: Install Aspire
        run: |
          ASPIRE_VERSION=$(curl -s https://api.github.com/repos/aspirehq/aspire-cli/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          curl -L "https://github.com/aspirehq/aspire-cli/releases/download/v${ASPIRE_VERSION}/aspire_${ASPIRE_VERSION}_Linux_x86_64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/aspire /usr/local/bin/
          aspire version

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test
